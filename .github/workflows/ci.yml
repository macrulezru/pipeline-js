name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Lint, build, test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (ESM + CJS)
        run: npm run build

      - name: Verify native Node ESM can load every entry point
        run: npm run verify:esm

      - name: Unit tests
        run: npm test

      - name: Type-level tests (pipe() builder)
        run: npm run test:types

      - name: Coverage (with thresholds)
        run: npm run test:coverage

      - name: Bundle size
        run: npx size-limit
